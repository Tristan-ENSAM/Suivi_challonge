name: Suivi classement Challonge

# Quand ce programme se lance :
on:
  schedule:
    # Tous les jours à 07:00 UTC.
    # ATTENTION : l'heure est en UTC, pas en heure de Paris.
    #   - Heure d'hiver (Paris = UTC+1) -> publication vers 08:00.
    #   - Heure d'été  (Paris = UTC+2) -> publication vers 09:00.
    # Pour changer l'heure, modifiez le premier chiffre (heure UTC) ci-dessous.
    - cron: "0 7 * * *"
  # Permet aussi de lancer le programme à la main depuis l'onglet « Actions ».
  workflow_dispatch:

jobs:
  publier:
    runs-on: ubuntu-latest
    # Autorise le workflow à enregistrer l'identifiant du message dans le dépôt.
    permissions:
      contents: write
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Publier le classement
        env:
          # Ces valeurs proviennent des « secrets » du dépôt (voir le README).
          CHALLONGE_USERNAME: ${{ secrets.CHALLONGE_USERNAME }}
          CHALLONGE_API_KEY: ${{ secrets.CHALLONGE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Le tournoi suivi est piloté par une « variable de dépôt » nommée
          # TOURNAMENT_SLUG (Settings > Secrets and variables > Actions, onglet
          # « Variables »). Pour changer de tournoi, modifiez cette variable —
          # sans toucher à ce fichier. La valeur après « || » sert de secours si
          # la variable n'est pas (encore) définie.
          TOURNAMENT_SLUG: ${{ vars.TOURNAMENT_SLUG || 'SquadronS17d3' }}
        run: python suivi.py

      - name: Mémoriser l'identifiant du message Discord
        # N'effectue un enregistrement que si l'identifiant a changé (1er passage
        # ou message recréé). La plupart du temps, il n'y a rien à enregistrer.
        run: |
          if [ -n "$(git status --porcelain etat.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add etat.json
            git commit -m "Memorisation du message Discord"
            git push
          else
            echo "Aucun changement d'etat a enregistrer."
          fi
